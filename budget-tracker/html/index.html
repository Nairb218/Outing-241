<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Outing 241 Ambagan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 selection:bg-blue-500 selection:text-white antialiased min-h-screen">

    <div class="max-w-6xl mx-auto p-6 lg:p-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-8">
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase italic">AMBAGAN<span class="text-blue-500"> Outing 241</span></h1>
                <p class="text-zinc-500 font-mono text-xs mt-1 uppercase tracking-widest">Ambag ng mga gwapo sa outing</p>
            </div>
            
            <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl min-w-[280px] shadow-2xl relative overflow-hidden">
                <span class="text-zinc-500 text-xs uppercase tracking-widest font-bold block mb-1">Total Outing Funds</span>
                <h2 id="grand-total" class="text-5xl font-bold text-blue-400 tabular-nums">₱0</h2>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="bg-zinc-900/50 border border-zinc-800 p-8 rounded-2xl backdrop-blur-sm">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Add to Roster</h3>
                    <div class="space-y-5">
                        <div>
                            <label for="friend-name" class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Name</label>
                            <input id="friend-name" type="text" placeholder="JUAN DELA CRUZ" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white placeholder:text-zinc-700">
                        </div>
                        <div>
                            <label for="friend-notes" class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Designation</label>
                            <input id="friend-notes" type="text" placeholder="DRIVER / HYPEMAN" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white placeholder:text-zinc-700">
                        </div>
                        <button onclick="addFriend()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-lg transition-all transform active:scale-[0.98] uppercase tracking-tighter">Deploy Member</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-zinc-900/50 border border-zinc-800 p-8 rounded-2xl backdrop-blur-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold uppercase tracking-tight">Mga may bitaw</h3>
                        <span class="bg-zinc-800 text-zinc-400 px-3 py-1 rounded text-[10px] font-mono border border-zinc-700 uppercase tracking-widest">Rate: ₱50.00 weekly</span>
                    </div>
                    <div id="friends-list" class="space-y-3">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script src="javascript/app.js"></script>
</body>
</html>
